worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" cache=$upstream_cache_status';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout 65;

    # ─── Rate Limiting ───────────────────────────────────────────────
    # 10m zone holds ~160,000 IP entries; 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=60r/m;
    limit_req_status 429;

    # ─── Cache Path ──────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx
                     levels=1:2
                     keys_zone=api_cache:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    # ─── Upstream ────────────────────────────────────────────────────
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Health check passthrough (no cache, no rate limit) ─────────
        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Search API ─────────────────────────────────────────────────
        location /api/properties/search/ {
            # Rate limiting: allow burst of 10, no delay for burst
            limit_req zone=api_rate_limit burst=10 nodelay;

            # Rate limit headers
            add_header X-RateLimit-Limit  "60" always;
            add_header X-RateLimit-Remaining $limit_req_status always;

            # Cache configuration
            proxy_cache            api_cache;
            proxy_cache_valid      200 10m;
            proxy_cache_valid      404 1m;
            proxy_cache_key        "$scheme$request_method$host$request_uri";
            proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock       on;

            # Cache bypass: if backend sends X-Cache-Purge header, bypass (used for invalidation)
            proxy_cache_bypass     $http_x_cache_purge;
            proxy_no_cache         $http_x_cache_purge;

            # Cache status header
            add_header X-Cache-Status $upstream_cache_status always;

            # Proxy settings
            proxy_pass             http://backend;
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header       Connection "";
            proxy_http_version     1.1;

            # Timeouts
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
            proxy_send_timeout     30s;
        }

        # ── All other API routes (update, etc.) ────────────────────────
        location /api/ {
            # Rate limiting on all API routes
            limit_req zone=api_rate_limit burst=10 nodelay;

            add_header X-RateLimit-Limit  "60" always;
            add_header X-RateLimit-Remaining $limit_req_status always;

            # No cache for non-search endpoints
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header X-Cache-Status "BYPASS" always;

            proxy_pass             http://backend;
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header       Connection "";
            proxy_http_version     1.1;
        }

        # Error pages
        error_page 429 @rate_limited;
        location @rate_limited {
            add_header Content-Type application/json always;
            add_header X-RateLimit-Limit "60" always;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Max 60 requests/minute."}';
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
