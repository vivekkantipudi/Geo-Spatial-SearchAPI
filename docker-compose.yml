services:
  # ─────────────────────────────────────────────
  # PostgreSQL with PostGIS
  # ─────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: geo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # OpenSearch
  # ─────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: geo_opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - os_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ─────────────────────────────────────────────
  # Data Ingestion (one-shot)
  # ─────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: scripts/Dockerfile.ingestion
    restart: "no"
    container_name: geo_ingestion
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX}
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    volumes:
      - ingestion_data:/app/data

  # ─────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geo_backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX}
      APP_PORT: ${APP_PORT}
      NODE_ENV: ${NODE_ENV}
      NGINX_CACHE_DIR: ${NGINX_CACHE_DIR}
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      ingestion:
        condition: service_completed_successfully
    volumes:
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # NGINX Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: geo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  pg_data:
  os_data:
  nginx_cache:
  ingestion_data:
